name: financee-smoke

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: financee_smoke
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: smoke-only-password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financee_smoke"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  web:
    build: .
    environment:
      SECRET_KEY: smoke-only-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost:18080
      DB_NAME: financee_smoke
      DB_USER: postgres
      DB_PASSWORD: smoke-only-password
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
    volumes:
      - smoke_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/health/')\""]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:${SMOKE_PORT:-18080}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - smoke_static:/app/staticfiles:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  smoke_static:
