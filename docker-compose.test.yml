name: financee-tests

services:
  test-db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test-only-password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 20

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    entrypoint: []
    command: ["scripts/run_django_tests.sh"]
    environment:
      SECRET_KEY: test-only-secret-key-not-for-production
      DEBUG: "False"
      DB_NAME: do_not_use
      DB_USER: do_not_use
      DB_PASSWORD: do_not_use
      DB_HOST: do_not_use
      DB_PORT: "5432"
      TEST_DB_NAME: financee_test_ci
      TEST_DB_USER: postgres
      TEST_DB_PASSWORD: test-only-password
      TEST_DB_HOST: test-db
      TEST_DB_PORT: "5432"
      REDIS_URL: ""
      PYTHONDONTWRITEBYTECODE: "1"
    depends_on:
      test-db:
        condition: service_healthy
