name: financee

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 12
    # PostgreSQL is intentionally NOT published to the host network.
    # Access it with: docker compose exec db psql -U $DB_USER -d $DB_NAME

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--maxmemory", "256mb",
        "--maxmemory-policy", "allkeys-lru",
        "--save", "",
        "--appendonly", "no",
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the compose network the services are reached by name.
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/authentication/login/')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment for HTTPS (Cloudflare Full-strict; see docker/nginx-ssl.conf):
      # - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # For HTTPS: comment out the nginx.conf line above and uncomment these
      # two lines after placing the Cloudflare origin cert in docker/certs/:
      # - ./docker/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./docker/certs:/etc/nginx/certs:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  pgdata:
  static_volume:
