name: Production Monitor

# Scheduled read-only production health monitor. It pipes
# scripts/monitor_production.sh over SSH to EC2, which checks uptime, container
# health, disk, backup age, PostgreSQL, and recent error volume. Any problem
# makes the run fail so GitHub emails the failure. It never changes the host.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-monitor
  cancel-in-progress: true

jobs:
  monitor:
    name: Production health monitor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: operations

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure trusted production SSH access
        env:
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
        run: |
          set -eu
          test -n "${PRODUCTION_SSH_KEY}"
          test -n "${PRODUCTION_KNOWN_HOSTS}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${PRODUCTION_SSH_KEY}" > "${HOME}/.ssh/production_key"
          printf '%s\n' "${PRODUCTION_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/production_key" "${HOME}/.ssh/known_hosts"

      - name: Run production health checks over SSH
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_PATH }}
        run: |
          set -eu
          test -n "${PRODUCTION_HOST}"
          test -n "${PRODUCTION_USER}"
          test -n "${PRODUCTION_PATH}"
          ssh -i "${HOME}/.ssh/production_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            sh -s -- "${PRODUCTION_PATH}" < scripts/monitor_production.sh
