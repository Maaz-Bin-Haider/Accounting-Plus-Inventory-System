name: Database Backup

# Scheduled off-site PostgreSQL backup. It SSHes into EC2, takes a verified
# custom-format pg_dump, keeps a 30-day local copy under backups/offsite/, and
# commits the dump to a separate private GitHub repository as the off-site copy.
# It never changes running containers and never touches the production database.

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: database-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Off-site database backup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: operations

    steps:
      - name: Verify backup repository configuration
        env:
          BACKUP_REPO: ${{ vars.BACKUP_REPO }}
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          set -eu
          test -n "${BACKUP_REPO}" || { echo "Set the BACKUP_REPO variable to owner/name of the private backup repo." >&2; exit 1; }
          test -n "${BACKUP_REPO_TOKEN}" || { echo "Set the BACKUP_REPO_TOKEN secret to a token with contents:write on the backup repo." >&2; exit 1; }

      - name: Configure trusted production SSH access
        env:
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
        run: |
          set -eu
          test -n "${PRODUCTION_SSH_KEY}"
          test -n "${PRODUCTION_KNOWN_HOSTS}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${PRODUCTION_SSH_KEY}" > "${HOME}/.ssh/production_key"
          printf '%s\n' "${PRODUCTION_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/production_key" "${HOME}/.ssh/known_hosts"

      - name: Create, verify, and prune the custom-format dump on EC2
        id: dump
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_PATH }}
        run: |
          set -eu
          test -n "${PRODUCTION_HOST}"
          test -n "${PRODUCTION_USER}"
          test -n "${PRODUCTION_PATH}"
          BACKUP_NAME="db-$(date -u '+%Y%m%d-%H%M').dump"
          echo "backup_name=${BACKUP_NAME}" >> "${GITHUB_OUTPUT}"
          ssh -i "${HOME}/.ssh/production_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            sh -s -- "${PRODUCTION_PATH}" "${BACKUP_NAME}" <<'REMOTE'
          set -eu
          PRODUCTION_PATH=$1
          BACKUP_NAME=$2
          STAGE_DIR="${PRODUCTION_PATH}/backups/offsite"
          BACKUP_PATH="${STAGE_DIR}/${BACKUP_NAME}"
          TEMP_PATH="${BACKUP_PATH}.tmp"
          install -d -m 700 "${STAGE_DIR}"
          cd "${PRODUCTION_PATH}"
          trap 'rm -f "${TEMP_PATH}"' EXIT INT TERM
          docker compose exec -T db sh -eu -c \
            'exec pg_dump --username="$POSTGRES_USER" --dbname="$POSTGRES_DB" --format=custom' \
            > "${TEMP_PATH}"
          test -s "${TEMP_PATH}"
          chmod 600 "${TEMP_PATH}"
          MANIFEST_LINES="$(docker compose exec -T db pg_restore --list < "${TEMP_PATH}" | wc -l)"
          test "${MANIFEST_LINES}" -gt 10
          mv "${TEMP_PATH}" "${BACKUP_PATH}"
          trap - EXIT INT TERM
          (cd "${STAGE_DIR}" && sha256sum "${BACKUP_NAME}" > "${BACKUP_NAME}.sha256")
          chmod 600 "${BACKUP_PATH}.sha256"
          CUTOFF="$(date -u -d '30 days ago' '+%Y%m%d' 2>/dev/null || date -u -v-30d '+%Y%m%d')"
          for f in "${STAGE_DIR}"/db-*.dump; do
            [ -e "${f}" ] || continue
            base="$(basename "${f}")"
            stamp="$(printf '%s' "${base}" | sed -n 's/^db-\([0-9]\{8\}\)-[0-9]\{4\}\.dump$/\1/p')"
            [ -n "${stamp}" ] || continue
            if [ "${stamp}" -lt "${CUTOFF}" ]; then
              rm -f "${f}" "${f}.sha256"
            fi
          done
          echo "Created ${BACKUP_NAME} (${MANIFEST_LINES} manifest lines); running containers were not changed."
          REMOTE

      - name: Download the verified dump to the runner
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_PATH }}
          BACKUP_NAME: ${{ steps.dump.outputs.backup_name }}
        run: |
          set -eu
          mkdir -p staged
          scp -i "${HOME}/.ssh/production_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}:${PRODUCTION_PATH}/backups/offsite/${BACKUP_NAME}" \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}:${PRODUCTION_PATH}/backups/offsite/${BACKUP_NAME}.sha256" \
            staged/
          (cd staged && sha256sum --check "${BACKUP_NAME}.sha256")

      - name: Check out the private backup repository
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.BACKUP_REPO }}
          token: ${{ secrets.BACKUP_REPO_TOKEN }}
          path: backup-repo
          persist-credentials: true

      - name: Commit the dump and prune backups older than 30 days
        env:
          BACKUP_NAME: ${{ steps.dump.outputs.backup_name }}
        run: |
          set -eu
          DEST="backup-repo/dumps"
          mkdir -p "${DEST}"
          cp "staged/${BACKUP_NAME}" "${DEST}/${BACKUP_NAME}"
          cp "staged/${BACKUP_NAME}.sha256" "${DEST}/${BACKUP_NAME}.sha256"
          CUTOFF="$(date -u -d '30 days ago' '+%Y%m%d')"
          for f in "${DEST}"/db-*.dump; do
            [ -e "${f}" ] || continue
            base="$(basename "${f}")"
            stamp="$(printf '%s' "${base}" | sed -n 's/^db-\([0-9]\{8\}\)-[0-9]\{4\}\.dump$/\1/p')"
            [ -n "${stamp}" ] || continue
            if [ "${stamp}" -lt "${CUTOFF}" ]; then
              rm -f "${f}" "${f}.sha256"
            fi
          done
          cd backup-repo
          git config user.name "financee-backup-bot"
          git config user.email "financee-backup-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No backup changes to commit."
            exit 0
          fi
          git commit -m "Automated database backup ${BACKUP_NAME}"
          git push
          echo "Pushed ${BACKUP_NAME} to the private backup repository."
