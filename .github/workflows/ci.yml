name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Quality and full system tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build cached Django test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.test
          load: true
          tags: financee-tests-test:latest
          cache-from: type=gha,scope=django-test
          cache-to: type=gha,mode=max,scope=django-test

      - name: Build cached PostgreSQL system-test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.system-test
          load: true
          tags: financee-system-tests-system-test:latest
          cache-from: type=gha,scope=postgres-system-test
          cache-to: type=gha,mode=max,scope=postgres-system-test

      - name: Build cached production image for smoke tests
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          tags: financee-smoke-web:latest
          cache-from: type=gha,scope=production
          cache-to: type=gha,mode=max,scope=production

      - name: Run canonical full test suite
        run: scripts/run_full_tests.sh
        env:
          SKIP_DOCKER_BUILD: "1"

      - name: Publish test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ github.sha }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

  build-production-image:
    name: Build ARM64 production image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build commit-tagged ARM64 image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          tags: financee:${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}
          outputs: type=docker,dest=/tmp/production-image.tar
          cache-from: type=gha,scope=production-arm64
          cache-to: type=gha,mode=max,scope=production-arm64

      - name: Record immutable image metadata
        env:
          COMMIT_SHA: ${{ github.sha }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p deployment-artifact
          mv /tmp/production-image.tar deployment-artifact/production-image.tar
          ARCHIVE_SHA256="$(sha256sum deployment-artifact/production-image.tar | cut -d ' ' -f 1)"
          {
            echo "commit_sha=${COMMIT_SHA}"
            echo "image_tag=financee:${COMMIT_SHA}"
            echo "image_digest=${IMAGE_DIGEST}"
            echo "archive_sha256=${ARCHIVE_SHA256}"
            echo "platform=linux/arm64"
          } > deployment-artifact/image-metadata.txt

      - name: Publish deployment image
        uses: actions/upload-artifact@v6
        with:
          name: production-image-${{ github.sha }}
          path: deployment-artifact/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  authorize-production:
    name: Deploy approved production release
    needs: build-production-image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    concurrency:
      group: production-deployment
      cancel-in-progress: false

    steps:
      - name: Check out deployment configuration
        uses: actions/checkout@v6

      - name: Download the tested production image
        uses: actions/download-artifact@v6
        with:
          name: production-image-${{ github.sha }}
          path: deployment-artifact/

      - name: Verify release identity and integrity
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -eu
          METADATA=deployment-artifact/image-metadata.txt
          ARCHIVE=deployment-artifact/production-image.tar
          test -f "${METADATA}"
          test -f "${ARCHIVE}"
          grep -Fx "commit_sha=${COMMIT_SHA}" "${METADATA}"
          grep -Fx "image_tag=financee:${COMMIT_SHA}" "${METADATA}"
          grep -Fx "platform=linux/arm64" "${METADATA}"
          ARCHIVE_SHA256="$(sed -n 's/^archive_sha256=//p' "${METADATA}")"
          test "$(printf '%s' "${ARCHIVE_SHA256}" | wc -c)" -eq 64
          printf '%s  %s\n' "${ARCHIVE_SHA256}" "${ARCHIVE}" | sha256sum --check
          docker load --input "${ARCHIVE}"
          test "$(docker image inspect "financee:${COMMIT_SHA}" --format '{{.Architecture}}')" = arm64
          test "$(docker image inspect "financee:${COMMIT_SHA}" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')" = "${COMMIT_SHA}"

      - name: Configure trusted production SSH access
        env:
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
        run: |
          set -eu
          test -n "${PRODUCTION_SSH_KEY}"
          test -n "${PRODUCTION_KNOWN_HOSTS}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${PRODUCTION_SSH_KEY}" > "${HOME}/.ssh/production_key"
          printf '%s\n' "${PRODUCTION_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/production_key" "${HOME}/.ssh/known_hosts"

      - name: Verify production host prerequisites without changing it
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_PATH }}
        run: |
          set -eu
          test -n "${PRODUCTION_HOST}"
          test -n "${PRODUCTION_USER}"
          test -n "${PRODUCTION_PATH}"
          ssh -i "${HOME}/.ssh/production_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            sh -s -- "${PRODUCTION_PATH}" <<'REMOTE'
          set -eu
          PRODUCTION_PATH=$1
          case "$(uname -m)" in
            aarch64|arm64) ;;
            *) echo "Production host is not ARM64." >&2; exit 1 ;;
          esac
          command -v docker >/dev/null
          docker version --format 'Docker server {{.Server.Version}}'
          docker compose version
          test -d "${PRODUCTION_PATH}"
          test -f "${PRODUCTION_PATH}/.env"
          test -f "${PRODUCTION_PATH}/docker-compose.yml"
          test -r "${PRODUCTION_PATH}/.env"
          cd "${PRODUCTION_PATH}"
          docker compose config --quiet
          echo "Production preflight passed without changing the host."
          REMOTE

      - name: Prepare commit-specific release directory
        env:
          COMMIT_SHA: ${{ github.sha }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_PATH }}
        run: |
          set -eu
          ARCHIVE_BYTES="$(wc -c < deployment-artifact/production-image.tar)"
          REQUIRED_BYTES="$((ARCHIVE_BYTES * 2))"
          ssh -i "${HOME}/.ssh/production_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            sh -s -- "${PRODUCTION_PATH}" "${COMMIT_SHA}" "${REQUIRED_BYTES}" <<'REMOTE'
          set -eu
          PRODUCTION_PATH=$1
          COMMIT_SHA=$2
          REQUIRED_BYTES=$3
          test "$(printf '%s' "${COMMIT_SHA}" | wc -c)" -eq 40
          case "${COMMIT_SHA}" in *[!0-9a-f]*) exit 1 ;; esac
          AVAILABLE_KB="$(df -Pk "${PRODUCTION_PATH}" | awk 'NR == 2 {print $4}')"
          test "$((AVAILABLE_KB * 1024))" -ge "${REQUIRED_BYTES}"
          install -d -m 700 "${PRODUCTION_PATH}/releases/${COMMIT_SHA}"
          REMOTE

      - name: Transfer approved image to its release directory
        env:
          COMMIT_SHA: ${{ github.sha }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_PATH }}
        run: |
          set -eu
          scp -i "${HOME}/.ssh/production_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            deployment-artifact/production-image.tar \
            deployment-artifact/image-metadata.txt \
            docker-compose.deploy.yml \
            production_fixes.sql \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}:${PRODUCTION_PATH}/releases/${COMMIT_SHA}/"

      - name: Verify and load the staged image on EC2
        env:
          COMMIT_SHA: ${{ github.sha }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_PATH }}
        run: |
          set -eu
          PATCH_SHA256="$(sha256sum production_fixes.sql | cut -d ' ' -f 1)"
          ssh -i "${HOME}/.ssh/production_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            sh -s -- "${PRODUCTION_PATH}" "${COMMIT_SHA}" "${PATCH_SHA256}" <<'REMOTE'
          set -eu
          PRODUCTION_PATH=$1
          COMMIT_SHA=$2
          PATCH_SHA256=$3
          RELEASE_DIR="${PRODUCTION_PATH}/releases/${COMMIT_SHA}"
          METADATA="${RELEASE_DIR}/image-metadata.txt"
          ARCHIVE="${RELEASE_DIR}/production-image.tar"
          chmod 600 "${ARCHIVE}" "${METADATA}" \
            "${RELEASE_DIR}/docker-compose.deploy.yml" \
            "${RELEASE_DIR}/production_fixes.sql"
          grep -Fx "commit_sha=${COMMIT_SHA}" "${METADATA}"
          grep -Fx "image_tag=financee:${COMMIT_SHA}" "${METADATA}"
          grep -Fx "platform=linux/arm64" "${METADATA}"
          ARCHIVE_SHA256="$(sed -n 's/^archive_sha256=//p' "${METADATA}")"
          test "$(printf '%s' "${ARCHIVE_SHA256}" | wc -c)" -eq 64
          case "${ARCHIVE_SHA256}" in *[!0-9a-f]*) exit 1 ;; esac
          printf '%s  %s\n' "${ARCHIVE_SHA256}" "${ARCHIVE}" | sha256sum --check
          printf '%s  %s\n' "${PATCH_SHA256}" "${RELEASE_DIR}/production_fixes.sql" | sha256sum --check
          docker load --input "${ARCHIVE}"
          test "$(docker image inspect "financee:${COMMIT_SHA}" --format '{{.Architecture}}')" = arm64
          test "$(docker image inspect "financee:${COMMIT_SHA}" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')" = "${COMMIT_SHA}"
          cd "${PRODUCTION_PATH}"
          RELEASE_IMAGE="financee:${COMMIT_SHA}" docker compose \
            -f docker-compose.yml \
            -f "${RELEASE_DIR}/docker-compose.deploy.yml" \
            config --quiet
          echo "Release ${COMMIT_SHA} staged and verified; running containers were not changed."
          REMOTE

      - name: Create and verify pre-deployment database backup
        env:
          COMMIT_SHA: ${{ github.sha }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_PATH }}
        run: |
          set -eu
          ssh -i "${HOME}/.ssh/production_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            sh -s -- "${PRODUCTION_PATH}" "${COMMIT_SHA}" <<'REMOTE'
          set -eu
          PRODUCTION_PATH=$1
          COMMIT_SHA=$2
          BACKUP_NAME="predeploy-${COMMIT_SHA}.dump"
          BACKUP_DIR="${PRODUCTION_PATH}/backups"
          BACKUP_PATH="${BACKUP_DIR}/${BACKUP_NAME}"
          TEMP_PATH="${BACKUP_PATH}.tmp"
          install -d -m 700 "${BACKUP_DIR}"
          cd "${PRODUCTION_PATH}"
          if [ ! -f "${BACKUP_PATH}" ]; then
            trap 'rm -f "${TEMP_PATH}"' EXIT INT TERM
            docker compose exec -T db sh -eu -c \
              'exec pg_dump --username="$POSTGRES_USER" --dbname="$POSTGRES_DB" --format=custom' \
              > "${TEMP_PATH}"
            test -s "${TEMP_PATH}"
            chmod 600 "${TEMP_PATH}"
            docker compose exec -T db pg_restore --list < "${TEMP_PATH}" >/dev/null
            mv "${TEMP_PATH}" "${BACKUP_PATH}"
            trap - EXIT INT TERM
            (cd "${BACKUP_DIR}" && sha256sum "${BACKUP_NAME}" > "${BACKUP_NAME}.sha256")
            chmod 600 "${BACKUP_PATH}.sha256"
          fi
          (cd "${BACKUP_DIR}" && sha256sum --check "${BACKUP_NAME}.sha256")
          MANIFEST_LINES="$(docker compose exec -T db pg_restore --list < "${BACKUP_PATH}" | wc -l)"
          test "${MANIFEST_LINES}" -gt 10
          echo "Verified PostgreSQL backup ${BACKUP_NAME} (${MANIFEST_LINES} manifest lines); production was not changed."
          REMOTE

      - name: Preserve the currently running image for rollback
        env:
          COMMIT_SHA: ${{ github.sha }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_PATH }}
        run: |
          set -eu
          ssh -i "${HOME}/.ssh/production_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            sh -s -- "${PRODUCTION_PATH}" "${COMMIT_SHA}" <<'REMOTE'
          set -eu
          PRODUCTION_PATH=$1
          COMMIT_SHA=$2
          RELEASE_DIR="${PRODUCTION_PATH}/releases/${COMMIT_SHA}"
          METADATA="${RELEASE_DIR}/rollback-metadata.txt"
          TEMP_METADATA="${METADATA}.tmp"
          ROLLBACK_TAG="financee:rollback-before-${COMMIT_SHA}"
          cd "${PRODUCTION_PATH}"
          CONTAINER_ID="$(docker compose ps -q web)"
          test -n "${CONTAINER_ID}"
          test "$(docker inspect "${CONTAINER_ID}" --format '{{.State.Running}}')" = true
          PREVIOUS_IMAGE_ID="$(docker inspect "${CONTAINER_ID}" --format '{{.Image}}')"
          test -n "${PREVIOUS_IMAGE_ID}"
          docker image inspect "${PREVIOUS_IMAGE_ID}" >/dev/null
          docker image tag "${PREVIOUS_IMAGE_ID}" "${ROLLBACK_TAG}"
          PREVIOUS_REVISION="$(docker image inspect "${PREVIOUS_IMAGE_ID}" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' 2>/dev/null || true)"
          CAPTURED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          {
            echo "release_commit=${COMMIT_SHA}"
            echo "previous_container_id=${CONTAINER_ID}"
            echo "previous_image_id=${PREVIOUS_IMAGE_ID}"
            echo "previous_revision=${PREVIOUS_REVISION}"
            echo "rollback_tag=${ROLLBACK_TAG}"
            echo "captured_at=${CAPTURED_AT}"
          } > "${TEMP_METADATA}"
          chmod 600 "${TEMP_METADATA}"
          mv "${TEMP_METADATA}" "${METADATA}"
          test "$(docker image inspect "${ROLLBACK_TAG}" --format '{{.Id}}')" = "${PREVIOUS_IMAGE_ID}"
          echo "Preserved running image as ${ROLLBACK_TAG}; running containers were not changed."
          REMOTE

      - name: Apply and record the verified production SQL patch
        env:
          COMMIT_SHA: ${{ github.sha }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_PATH }}
        run: |
          set -eu
          ssh -i "${HOME}/.ssh/production_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            sh -s -- "${PRODUCTION_PATH}" "${COMMIT_SHA}" <<'REMOTE'
          set -eu
          PRODUCTION_PATH=$1
          COMMIT_SHA=$2
          RELEASE_DIR="${PRODUCTION_PATH}/releases/${COMMIT_SHA}"
          PATCH_PATH="${RELEASE_DIR}/production_fixes.sql"
          PATCH_LOG="${RELEASE_DIR}/production-fixes.log"
          BACKUP_NAME="predeploy-${COMMIT_SHA}.dump"
          BACKUP_PATH="${PRODUCTION_PATH}/backups/${BACKUP_NAME}"
          PATCH_SHA256="$(sha256sum "${PATCH_PATH}" | cut -d ' ' -f 1)"
          cd "${PRODUCTION_PATH}"
          (cd backups && sha256sum --check "${BACKUP_NAME}.sha256")
          docker compose exec -T db sh -eu -c \
            'exec psql --username="$POSTGRES_USER" --dbname="$POSTGRES_DB" --no-psqlrc --set=ON_ERROR_STOP=1' <<'LEDGER_SQL'
          BEGIN;
          SELECT pg_advisory_xact_lock(hashtext('financee-production-sql-patches'));
          CREATE SCHEMA IF NOT EXISTS deployment_meta;
          CREATE TABLE IF NOT EXISTS deployment_meta.sql_patches (
              patch_sha256 text PRIMARY KEY,
              patch_name text NOT NULL,
              source_commit text NOT NULL,
              backup_name text NOT NULL,
              applied_at timestamptz NOT NULL DEFAULT clock_timestamp()
          );
          COMMIT;
          LEDGER_SQL
          APPLIED_COUNT="$(docker compose exec -T \
            -e PATCH_SHA256="${PATCH_SHA256}" db sh -eu -c \
            'exec psql --username="$POSTGRES_USER" --dbname="$POSTGRES_DB" --no-psqlrc --tuples-only --no-align --set=ON_ERROR_STOP=1 --set=patch_sha="$PATCH_SHA256"' <<'CHECK_SQL'
          SELECT count(*)
          FROM deployment_meta.sql_patches
          WHERE patch_sha256 = :'patch_sha';
          CHECK_SQL
          )"
          APPLIED_COUNT="$(printf '%s' "${APPLIED_COUNT}" | tr -d '[:space:]')"
          case "${APPLIED_COUNT}" in
            0)
              if ! docker compose exec -T db sh -eu -c \
                'exec psql --username="$POSTGRES_USER" --dbname="$POSTGRES_DB" --no-psqlrc --set=ON_ERROR_STOP=1' \
                < "${PATCH_PATH}" > "${PATCH_LOG}" 2>&1; then
                chmod 600 "${PATCH_LOG}"
                tail -n 80 "${PATCH_LOG}" >&2
                exit 1
              fi
              chmod 600 "${PATCH_LOG}"
              grep -F "production_fixes.sql applied successfully." "${PATCH_LOG}"
              docker compose exec -T \
                -e PATCH_SHA256="${PATCH_SHA256}" \
                -e SOURCE_COMMIT="${COMMIT_SHA}" \
                -e BACKUP_NAME="${BACKUP_NAME}" \
                db sh -eu -c \
                'exec psql --username="$POSTGRES_USER" --dbname="$POSTGRES_DB" --no-psqlrc --set=ON_ERROR_STOP=1 --set=patch_sha="$PATCH_SHA256" --set=source_commit="$SOURCE_COMMIT" --set=backup_name="$BACKUP_NAME"' <<'RECORD_SQL'
          INSERT INTO deployment_meta.sql_patches (
              patch_sha256, patch_name, source_commit, backup_name
          ) VALUES (
              :'patch_sha', 'production_fixes.sql', :'source_commit', :'backup_name'
          ) ON CONFLICT (patch_sha256) DO NOTHING;
          RECORD_SQL
              echo "Applied production_fixes.sql (${PATCH_SHA256}) and recorded it in deployment_meta.sql_patches."
              ;;
            1)
              echo "production_fixes.sql (${PATCH_SHA256}) was already recorded; skipped reapplication."
              ;;
            *)
              echo "Unexpected SQL patch ledger result: ${APPLIED_COUNT}" >&2
              exit 1
              ;;
          esac
          VERIFIED_COUNT="$(docker compose exec -T \
            -e PATCH_SHA256="${PATCH_SHA256}" db sh -eu -c \
            'exec psql --username="$POSTGRES_USER" --dbname="$POSTGRES_DB" --no-psqlrc --tuples-only --no-align --set=ON_ERROR_STOP=1 --set=patch_sha="$PATCH_SHA256"' <<'VERIFY_SQL'
          SELECT count(*)
          FROM deployment_meta.sql_patches
          WHERE patch_sha256 = :'patch_sha'
            AND patch_name = 'production_fixes.sql';
          VERIFY_SQL
          )"
          test "$(printf '%s' "${VERIFIED_COUNT}" | tr -d '[:space:]')" = 1
          REMOTE

      - name: Deploy release and automatically roll back if unhealthy
        env:
          COMMIT_SHA: ${{ github.sha }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PATH: ${{ vars.PRODUCTION_PATH }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          set -eu
          ssh -i "${HOME}/.ssh/production_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            sh -s -- "${PRODUCTION_PATH}" "${COMMIT_SHA}" "${PRODUCTION_URL}" <<'REMOTE'
          set -eu
          PRODUCTION_PATH=$1
          COMMIT_SHA=$2
          PRODUCTION_URL=$3
          RELEASE_DIR="${PRODUCTION_PATH}/releases/${COMMIT_SHA}"
          OVERRIDE="${RELEASE_DIR}/docker-compose.deploy.yml"
          ROLLBACK_METADATA="${RELEASE_DIR}/rollback-metadata.txt"
          RELEASE_IMAGE="financee:${COMMIT_SHA}"
          ROLLBACK_IMAGE="$(sed -n 's/^rollback_tag=//p' "${ROLLBACK_METADATA}")"
          RESULT_FILE="${RELEASE_DIR}/deployment-result.txt"
          STARTED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          cd "${PRODUCTION_PATH}"
          command -v curl >/dev/null
          case "${PRODUCTION_URL}" in
            https://*/) echo "PRODUCTION_URL must not end with a slash." >&2; exit 1 ;;
            https://*) ;;
            *) echo "PRODUCTION_URL must be an HTTPS origin." >&2; exit 1 ;;
          esac
          test "${ROLLBACK_IMAGE}" = "financee:rollback-before-${COMMIT_SHA}"
          docker image inspect "${RELEASE_IMAGE}" >/dev/null
          docker image inspect "${ROLLBACK_IMAGE}" >/dev/null

          compose_up() {
            target_image=$1
            RELEASE_IMAGE="${target_image}" docker compose \
              -f docker-compose.yml -f "${OVERRIDE}" \
              up -d --no-build web nginx
          }

          wait_until_healthy() {
            expected_image=$1
            attempts=0
            while [ "${attempts}" -lt 36 ]; do
              container_id="$(RELEASE_IMAGE="${expected_image}" docker compose \
                -f docker-compose.yml -f "${OVERRIDE}" ps -q web)"
              if [ -n "${container_id}" ]; then
                running="$(docker inspect "${container_id}" --format '{{.State.Running}}')"
                health="$(docker inspect "${container_id}" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}')"
                actual_image="$(docker inspect "${container_id}" --format '{{.Image}}')"
                expected_id="$(docker image inspect "${expected_image}" --format '{{.Id}}')"
                if [ "${running}" = true ] && [ "${health}" = healthy ] && \
                   [ "${actual_image}" = "${expected_id}" ]; then
                  health_body="$(curl --fail --silent --show-error --max-time 10 http://127.0.0.1/health/)" || return 1
                  [ "${health_body}" = '{"status": "ok"}' ] && return 0
                fi
                [ "${running}" = false ] && return 1
                [ "${health}" = unhealthy ] && return 1
              fi
              attempts=$((attempts + 1))
              sleep 5
            done
            return 1
          }

          verify_public_routes() {
            attempts=0
            while [ "${attempts}" -lt 3 ]; do
              health_body="$(curl --fail --silent --show-error --max-time 15 "${PRODUCTION_URL}/health/")" || health_body=
              login_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' --max-time 15 "${PRODUCTION_URL}/authentication/login/")" || login_status=000
              static_headers="$(curl --fail --silent --show-error --dump-header - --output /dev/null --max-time 15 "${PRODUCTION_URL}/static/css/login_styling.css")" || static_headers=
              if [ "${health_body}" = '{"status": "ok"}' ] && \
                 [ "${login_status}" = 200 ] && \
                 printf '%s' "${static_headers}" | grep -qi 'cache-control: public, immutable'; then
                return 0
              fi
              attempts=$((attempts + 1))
              sleep 5
            done
            return 1
          }

          if compose_up "${RELEASE_IMAGE}" && \
             wait_until_healthy "${RELEASE_IMAGE}" && \
             verify_public_routes; then
            FINISHED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            {
              echo "status=deployed"
              echo "commit_sha=${COMMIT_SHA}"
              echo "image=${RELEASE_IMAGE}"
              echo "rollback_image=${ROLLBACK_IMAGE}"
              echo "started_at=${STARTED_AT}"
              echo "finished_at=${FINISHED_AT}"
            } > "${RESULT_FILE}.tmp"
            chmod 600 "${RESULT_FILE}.tmp"
            mv "${RESULT_FILE}.tmp" "${RESULT_FILE}"
            printf '%s\n' "${COMMIT_SHA}" > .deployed-commit.tmp
            chmod 600 .deployed-commit.tmp
            mv .deployed-commit.tmp .deployed-commit
            echo "Deployed ${RELEASE_IMAGE}; container and HTTP health checks passed."
            exit 0
          fi

          echo "Release ${RELEASE_IMAGE} failed health checks; rolling back to ${ROLLBACK_IMAGE}." >&2
          compose_up "${ROLLBACK_IMAGE}"
          if wait_until_healthy "${ROLLBACK_IMAGE}" && verify_public_routes; then
            FINISHED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            {
              echo "status=rolled_back"
              echo "commit_sha=${COMMIT_SHA}"
              echo "failed_image=${RELEASE_IMAGE}"
              echo "restored_image=${ROLLBACK_IMAGE}"
              echo "started_at=${STARTED_AT}"
              echo "finished_at=${FINISHED_AT}"
            } > "${RESULT_FILE}.tmp"
            chmod 600 "${RESULT_FILE}.tmp"
            mv "${RESULT_FILE}.tmp" "${RESULT_FILE}"
            echo "Rollback health checks passed; previous production image was restored." >&2
            exit 1
          fi
          echo "CRITICAL: release and rollback health checks both failed." >&2
          docker compose -f docker-compose.yml -f "${OVERRIDE}" ps >&2
          exit 1
          REMOTE
