# nginx config with HTTPS (Cloudflare Full-strict mode) for swisstechfinance.com
#
# Use this INSTEAD of nginx.conf once the Cloudflare Origin Certificate is in
# place. See DEPLOYMENT_GUIDE.md and docker-compose.yml comments:
#   1. Put the origin certificate at  docker/certs/origin.pem
#      and its private key at        docker/certs/origin-key.pem
#   2. In docker-compose.yml (nginx service) switch the config mount to this
#      file, add the certs mount, and publish port 443.
#   3. Open port 443 in the EC2 security group.
#   4. Set Cloudflare SSL/TLS mode to "Full (strict)".

# Plain HTTP - still serves direct IP access and any non-proxied traffic.
server {
    listen 80;
    server_name swisstechfinance.com www.swisstechfinance.com 13.232.33.250 _;

    client_max_body_size 25m;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}

# HTTPS - Cloudflare connects here in Full (strict) mode using the free
# Cloudflare Origin Certificate (valid up to 15 years, trusted by Cloudflare).
server {
    listen 443 ssl;
    http2 on;
    server_name swisstechfinance.com www.swisstechfinance.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
