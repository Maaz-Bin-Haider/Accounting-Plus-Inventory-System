# nginx site config for the Accounting Plus Inventory System.
# nginx runs in its own container, serves collected static files directly
# and proxies everything else to the gunicorn web container.

server {
    listen 80;
    server_name 13.232.33.250 _;

    client_max_body_size 25m;

    # Collected static files (shared volume with the web container).
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
